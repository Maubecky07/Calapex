<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GridHub - Wartungsarbeiten</title>

<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
/* GRIDHUB DESIGN-DNA */
body {
    margin: 0;
    color: #fff;
    font-family: 'Exo 2';
    overflow: hidden;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #050505;
    background-image: 
        radial-gradient(at 0% 0%, rgba(0, 204, 255, 0.2) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(0, 100, 255, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(0, 204, 255, 0.2) 0px, transparent 50%),
        radial-gradient(at 0% 100%, rgba(0, 80, 200, 0.15) 0px, transparent 50%);
    background-attachment: fixed;
}

body::after {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: radial-gradient(circle, #00ccff 1.5px, transparent 1.5px);
    background-size: 80px 80px;
    opacity: 0.15;
    z-index: -1;
}

.maintenance-container {
    text-align: center;
    background: rgba(21, 21, 21, 0.9);
    border: 2px solid #00ccff;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 0 30px rgba(0, 204, 255, 0.2);
    max-width: 500px;
    width: 90%;
}

.logo {
    max-width: 250px;
    margin-bottom: 20px;
    mix-blend-mode: screen;
}

h1 {
    font-family: 'Orbitron';
    color: #00ccff;
    font-size: 24px;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
}

p {
    color: #ccc;
    font-size: 16px;
    line-height: 1.6;
}

/* COUNTDOWN STYLING */
#countdown {
    font-family: 'Orbitron';
    font-size: 32px;
    color: #fff;
    margin: 30px 0;
    text-shadow: 0 0 10px rgba(0, 204, 255, 0.5);
    display: flex;
    justify-content: center;
    gap: 15px;
}

.time-box {
    background: #111;
    border: 1px solid #333;
    padding: 10px;
    border-radius: 8px;
    min-width: 70px;
}

.time-label {
    display: block;
    font-size: 10px;
    color: #00ccff;
    margin-top: 5px;
}

.status-indicator {
    display: inline-block;
    padding: 5px 15px;
    background: rgba(255, 165, 0, 0.2);
    border: 1px solid orange;
    color: orange;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
    margin-top: 20px;
    font-family: 'Orbitron';
}

</style>
</head>
<body>

<div class="maintenance-container">
    <img src="https://hbuppukuizrnzrhwvfou.supabase.co/storage/v1/object/public/team-logos/gridhub_logo.jpeg" alt="GridHub Logo" class="logo">
    
    <h1>Boxenstopp</h1>
    <p>Wir schrauben gerade am GridHub Kalender, um die Performance zu verbessern. Wir sind bald wieder auf der Strecke!</p>

    <div id="countdown">
        </div>

    <div class="status-indicator">● SYSTEM-WARTUNG AKTIV</div>
</div>

<script>
/** * EINSTELLUNGEN 
 * Ändere hier das Datum, bis wann die Wartung gehen soll
 */
const MAINTENANCE_END = "2026-05-11T16:00:00"; // Format: YYYY-MM-DDTHH:MM:SS

function updateCountdown() {
    const target = new Date(MAINTENANCE_END).getTime();
    const now = new Date().getTime();
    const diff = target - now;

    const countdownEl = document.getElementById("countdown");

    if (diff <= 0) {
        countdownEl.innerHTML = "BOXENSTOPP BEENDET!";
        return;
    }

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((diff % (1000 * 60)) / 1000);

    countdownEl.innerHTML = `
        <div class="time-box">${d}<span class="time-label">TAGE</span></div>
        <div class="time-box">${h}<span class="time-label">STD</span></div>
        <div class="time-box">${m}<span class="time-label">MIN</span></div>
        <div class="time-box">${s}<span class="time-label">SEK</span></div>
    `;
}

// Initialer Aufruf und Intervall
updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>
